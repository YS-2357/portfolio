<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Deep space background -->
  <rect width="32" height="32" rx="7" fill="#070c18"/>
  <!-- Orbital ring (dashed circle, solar gold) -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="#f2c14e" stroke-width="0.8" stroke-opacity="0.35" stroke-dasharray="3 3"/>
  <!-- Star dots -->
  <circle cx="6"  cy="6"  r="0.8" fill="#f2c14e" opacity="0.5"/>
  <circle cx="26" cy="8"  r="0.6" fill="#f2c14e" opacity="0.4"/>
  <circle cx="25" cy="25" r="0.7" fill="#f2c14e" opacity="0.45"/>
  <!-- YS monogram -->
  <text
    x="16" y="21"
    text-anchor="middle"
    font-family="'Space Grotesk', 'Inter', system-ui, sans-serif"
    font-weight="700"
    font-size="13"
    fill="#f2c14e"
    letter-spacing="1.5"
  >YS</text>
</svg>
